<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAPZ AW | MONITORING</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: radial-gradient(circle at center, #0f172a 0%, #000 100%); 
            color: #38bdf8; 
            font-family: 'Fira Code', monospace; 
        }
        .glow-border { border: 1px solid rgba(56, 189, 248, 0.3); box-shadow: 0 0 15px rgba(56, 189, 248, 0.1); }
        .progress-fill { transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .shimmer { animation: shimmer 2s infinite; }
        @keyframes shimmer { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-xl w-full bg-black/60 backdrop-blur-md p-8 rounded-3xl glow-border">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold tracking-tighter text-white mb-2">𝐀𝐖𝐄𝐑𝐀</h1>
            <p class="text-xs text-blue-500 uppercase tracking-[0.3em] shimmer">System Live Monitoring</p>
        </div>

        <div class="mb-10">
            <div class="flex justify-between items-end mb-3">
                <span class="text-[10px] font-bold opacity-60">GENERATION PROGRESS</span>
                <span id="percent" class="text-3xl font-black text-white">0%</span>
            </div>
            <div class="h-3 w-full bg-slate-900 rounded-full overflow-hidden border border-blue-900/50">
                <div id="bar" class="h-full bg-gradient-to-r from-blue-600 to-cyan-400 progress-fill" style="width: 0%"></div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-blue-950/20 p-4 rounded-xl border border-blue-900/30">
                <p class="text-[9px] opacity-50 mb-1">CURRENT / TARGET</p>
                <p id="stats" class="text-xl font-bold text-white">0 / 0</p>
            </div>
            <div class="bg-blue-950/20 p-4 rounded-xl border border-blue-900/30">
                <p class="text-[9px] opacity-50 mb-1">LAST ID GENERATED</p>
                <p id="last_id" class="text-xl font-bold text-cyan-400">---</p>
            </div>
        </div>

        <div class="bg-red-950/10 p-4 rounded-xl border border-red-900/20 mb-6">
            <p class="text-[9px] text-red-500 font-bold mb-1 underline">SYSTEM_LOGS</p>
            <p id="error" class="text-xs text-slate-400 italic">Checking system integrity...</p>
        </div>

        <div class="text-center border-t border-blue-900/20 pt-6">
            <p class="text-[10px] opacity-40 mb-1">LAST_SYNC_TIME</p>
            <p id="sync" class="text-[10px] text-blue-400 tracking-widest">-- : -- : --</p>
        </div>
    </div>

    <script>
        async function updateDashboard() {
            try {
                const response = await fetch('status.json?t=' + Date.now());
                const data = await response.json();
                
                document.getElementById('percent').innerText = data.percent + '%';
                document.getElementById('bar').style.width = data.percent + '%';
                document.getElementById('stats').innerText = `${data.current} / ${data.total}`;
                document.getElementById('last_id').innerText = data.last_id;
                document.getElementById('error').innerText = data.error === "None" ? "✔ System Stable: No errors detected" : "✖ Error: " + data.error;
                document.getElementById('sync').innerText = data.last_update;
            } catch (err) {
                console.log("Syncing...");
            }
        }
        setInterval(updateDashboard, 5000); // Update tiap 5 detik
        updateDashboard();
    </script>
</body>
</html>
